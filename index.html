<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Error</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

body {
    margin: 0;
    padding: 0;
    height: 100vh;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Share Tech Mono', monospace;
    color: #00ff88;
    overflow: hidden;
}

/* Animated background lines */
body::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background: repeating-linear-gradient(
        0deg,
        rgba(0,255,120,0.08) 0px,
        rgba(0,255,120,0.08) 2px,
        transparent 2px,
        transparent 4px
    );
    animation: moveBg 5s linear infinite;
}

@keyframes moveBg {
    from { transform: translateY(0); }
    to { transform: translateY(100px); }
}

.container {
    text-align: center;
    z-index: 2;
}

h1 {
    font-size: 70px;
    animation: glitch 1s infinite;
}

@keyframes glitch {
    0% { text-shadow: 3px 3px #003300; }
    25% { text-shadow: -3px -3px #00ff88; }
    50% { text-shadow: 3px -3px #00aa55; }
    75% { text-shadow: -3px 3px #00ff88; }
    100% { text-shadow: 3px 3px #003300; }
}

p {
    margin-top: 10px;
    font-size: 18px;
    opacity: 0.8;
}

.btn {
    margin-top: 25px;
    padding: 10px 30px;
    border: 2px solid #00ff88;
    background: transparent;
    color: #00ff88;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    background: #00ff88;
    color: black;
    box-shadow: 0 0 15px #00ff88;
}
</style>
</head>

<body>

<div class="container">
    <h1>ACCESS DENIED</h1>
    <p>Page No Longer Exists.</p>
    <button class="btn" onclick="showMessage()">Go Back</button>
</div>

<script>
function showMessage() {
    alert("Thank you :)");
}
</script>

</body>
</html>
